name: Docker Build & Push

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: Dockerfile
            image-suffix: ""
            platform: linux/amd64
            runner: ubuntu-latest

          - dockerfile: Dockerfile
            image-suffix: ""
            platform: linux/arm64
            runner: ubuntu-24.04-arm

          - dockerfile: Dockerfile.worker
            image-suffix: "-worker"
            platform: linux/amd64
            runner: ubuntu-latest

          - dockerfile: Dockerfile.worker
            image-suffix: "-worker"
            platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image name and arch
        id: prep
        run: |
          suffix="${{ matrix.image-suffix }}"
          base=$(echo "${{ env.IMAGE_NAME }}" | sed "s|/rustytalon$|/rustytalon${suffix}|")
          echo "image=${{ env.REGISTRY }}/$base" >> $GITHUB_OUTPUT
          echo "arch=$(echo '${{ matrix.platform }}' | tr '/' '-' | cut -d'-' -f2)" >> $GITHUB_OUTPUT

      - name: Build and push per-arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.prep.outputs.image }}:${{ github.sha }}-${{ steps.prep.outputs.arch }}
          cache-from: type=gha,scope=${{ matrix.dockerfile }}-${{ steps.prep.outputs.arch }}
          cache-to: type=gha,scope=${{ matrix.dockerfile }}-${{ steps.prep.outputs.arch }},mode=max

  merge:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - image-suffix: ""
          - image-suffix: "-worker"

    steps:
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image name
        id: prep
        run: |
          suffix="${{ matrix.image-suffix }}"
          base=$(echo "${{ env.IMAGE_NAME }}" | sed "s|/rustytalon$|/rustytalon${suffix}|")
          echo "image=${{ env.REGISTRY }}/$base" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prep.outputs.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Create and push multi-arch manifest
        run: |
          IMAGE="${{ steps.prep.outputs.image }}"
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            docker buildx imagetools create \
              -t "$tag" \
              "${IMAGE}:${{ github.sha }}-amd64" \
              "${IMAGE}:${{ github.sha }}-arm64"
          done <<< "${{ steps.meta.outputs.tags }}"

  verify:
    needs: [merge]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Check container registry
        run: |
          echo "Docker images built and pushed successfully!"
          echo "Agent image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${GITHUB_REF#refs/tags/}"
          echo "Worker image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-worker:${GITHUB_REF#refs/tags/}"
